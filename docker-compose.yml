services:

  app:
    build: .
    container_name: api_dog_app
    volumes:
      - .:/var/www
    ports:
      - "8080:8000"
    networks:
      - laravel

  db:
    image: mysql:8.0
    container_name: api-dog-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel

networks:
  laravel:

volumes:
  mysql_data: